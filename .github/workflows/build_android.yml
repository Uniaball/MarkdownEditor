name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_PLATFORM: android-36
      ANDROID_NDK_VERSION: 27.0.12077973

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK platform and NDK 28
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;$ANDROID_PLATFORM" "ndk;$ANDROID_NDK_VERSION"

      - name: Remove all other platforms to prevent auto-selection
        run: |
          find $ANDROID_SDK_ROOT/platforms -maxdepth 1 -type d -name 'android-*' ! -name "${ANDROID_PLATFORM}" -exec rm -rf {} \;
          find $ANDROID_SDK_ROOT/platforms -maxdepth 1 -type d -name '*ext*' -exec rm -rf {} \;
          echo "Remaining platforms:"
          ls $ANDROID_SDK_ROOT/platforms

      - name: Install Qt for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          target: 'android'
          arch: 'android_arm64_v8a'
          cache: true

      - name: Configure project
        run: |
          export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION
          export Qt6_DIR=${{ runner.temp }}/Qt/6.11.1/android_arm64_v8a
          qt-cmake -GNinja -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DANDROID_PLATFORM=$ANDROID_PLATFORM \
            -B build .

      - name: Build APK
        run: |
          export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION
          cmake --build build --target apk --parallel $(nproc)

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: markdown-editor-apk
          path: build/android-build/build/outputs/apk/release/*.apk