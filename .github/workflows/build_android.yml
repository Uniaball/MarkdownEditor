name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Qt for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtbase'
          cache: true

      - name: Configure project
        run: |
          qt-cmake -GNinja -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME \
            -B build .

      - name: Build APK
        run: cmake --build build --target apk --parallel $(nproc)

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: markdown-editor-apk
          path: build/android-build/build/outputs/apk/debug/*.apk
